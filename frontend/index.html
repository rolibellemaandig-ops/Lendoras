<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lendora">
    <meta name="theme-color" content="#1e3a8a">
    <title>Lendora | Buy less. Do more</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            -webkit-font-smoothing: antialiased;
        }

        #root {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .phone-container {
            width: 100%;
            max-width: 390px;
            height: 100vh;
            margin: 0 auto;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 16px;
            color: #666;
        }

        .error {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">Loading Lendora...</div>
    </div>

    <script>
        // Check API connection
        async function checkAPI() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                console.log('✓ Backend API connected:', data);
                return true;
            } catch (error) {
                console.error('❌ Backend API not available:', error);
                document.querySelector('#root').innerHTML = `
                    <div class="error">
                        <div>
                            <h2>Backend Connection Error</h2>
                            <p>The app couldn't connect to the backend API.</p>
                            <p style="margin-top: 10px; font-size: 12px; color: #999;">
                                Make sure the backend is running at http://localhost:5000
                            </p>
                        </div>
                    </div>
                `;
                return false;
            }
        }

        checkAPI();
    </script>

    <!-- React -->
    <script async src="/vendor/react/react.production.min.js"></script>
    <script async src="/vendor/react-dom/react-dom.production.min.js"></script>
    <script async src="/vendor/framer-motion/framer-motion.js"></script>
    <script async src="/vendor/leaflet/leaflet.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => {
                        console.log('✓ Service Worker registered');
                        // Check for updates every hour
                        setInterval(() => reg.update(), 3600000);
                    })
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // Handle offline/online status
        window.addEventListener('online', () => {
            console.log('✓ App is online');
            document.documentElement.style.opacity = '1';
            // Trigger sync if available
            if ('serviceWorker' in navigator && 'SyncManager' in window) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.sync.register('sync-messages');
                    reg.sync.register('sync-rentals');
                });
            }
        });

        window.addEventListener('offline', () => {
            console.log('⚠️ App is offline - using cached content');
            document.documentElement.style.opacity = '0.9';
        });
    </script>

    <!-- App -->
    <script async src="/standalone/lendora-app.js"></script>
</body>
</html>
