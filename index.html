<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icons/lendora-icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Lendora | Buy less. Do more</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__LENDORA_FALLBACK_TIMEOUT__ = window.setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          window.location.replace('./Lendora-standalone.html');
        }
      }, 1500);
    </script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
